<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Anna Vista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-main: #0f172a; 
            --accent-blue: #3b82f6;
            --accent-rose: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .checkout-container {
            max-width: 900px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.2fr;
        }

        /* Side A: Food Details */
        .food-preview {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-right: 1px solid var(--glass-border);
        }

        .food-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .food-info h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .food-info p {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .stock-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
        }

        /* Side B: Controls */
        .order-controls {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .quantity-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: block;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .qty-btn {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        #quantity {
            width: 70px;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* Hide Number Spinners */
        #quantity::-webkit-inner-spin-button, 
        #quantity::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .total-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .total-label { color: var(--text-dim); font-size: 0.9rem; }
        .total-amount { 
            display: block; 
            font-size: 2rem; 
            font-weight: 900; 
            color: var(--accent-rose);
            margin-top: 5px;
        }

        .submit-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.5);
        }

        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
            .food-preview { border-right: none; border-bottom: 1px solid var(--glass-border); }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="food-preview">
            {% if food %}
            <img src="{{ food.photo.url }}" alt="{{ food.item }}" class="food-image">
            <div class="food-info">
                <h3>{{ food.item }}</h3>
                <p>{{ food.description }}</p>
                <div class="stock-badge">
                    <i class="fas fa-layer-group"></i> Available: <span id="maxStock">{{ food.quantity }}</span> Units
                </div>
            </div>
            {% endif %}
        </div>

        <div class="order-controls">
            <h2>Complete Your Order</h2>
            
            <form id="quantityForm" method="POST">
                {% csrf_token %}
                
                <span class="quantity-label">Select Quantity</span>
                <div class="quantity-selector">
                    <button type="button" id="decreaseBtn" class="qty-btn"><i class="fas fa-minus"></i></button>
                    <input type="number" id="quantity" name="quantity" min="1" max="{{ food.quantity }}" value="1" readonly>
                    <button type="button" id="increaseBtn" class="qty-btn"><i class="fas fa-plus"></i></button>
                </div>

                <div class="total-box">
                    <span class="total-label">Total Payable Amount</span>
                    <span class="total-amount">₹<span id="totalAmount">{{ food.price }}</span></span>
                </div>

                <button type="submit" class="submit-btn">
                    PLACE ORDER <i class="fas fa-chevron-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const unitPrice = parseFloat("{{ food.price|default:0 }}");
        const maxQuantity = parseInt("{{ food.quantity|default:1 }}");
        const qtyInput = document.getElementById('quantity');
        const totalDisplay = document.getElementById('totalAmount');

        function updateUI() {
            let currentQty = parseInt(qtyInput.value) || 1;
            totalDisplay.textContent = (currentQty * unitPrice).toLocaleString('en-IN', {minimumFractionDigits: 2});
        }

        document.getElementById('increaseBtn').addEventListener('click', () => {
            let val = parseInt(qtyInput.value);
            if (val < maxQuantity) {
                qtyInput.value = val + 1;
                updateUI();
            }
        });

        document.getElementById('decreaseBtn').addEventListener('click', () => {
            let val = parseInt(qtyInput.value);
            if (val > 1) {
                qtyInput.value = val - 1;
                updateUI();
            }
        });
    </script>
</body>
</html>
