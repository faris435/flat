<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Vista | My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a; 
            --accent-blue: #3b82f6;
            --accent-rose: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(244, 63, 94, 0.05) 0%, transparent 30%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Profile Header --- */
        .photo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 45px;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            padding: 5px;
            background: var(--bg-main);
        }

        .no-photo {
            width: 150px;
            height: 150px;
            border-radius: 45px;
            background: var(--glass);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--text-dim);
            color: var(--text-dim);
        }

        .status-tag {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-rose);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 15px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(244, 63, 94, 0.3);
        }

        h2 { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .sub-text { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        /* --- Profile Info List --- */
        .info-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child { border-bottom: none; }

        .info-row i {
            width: 35px;
            height: 35px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 14px;
        }

        .info-content label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-content span {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Actions --- */
        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-edit {
            background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .btn-edit:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .btn-back {
            background: var(--glass);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-back:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

<div class="profile-container">
    <div class="photo-wrapper">
        {% if profile.photo %}
            <img src="{{ profile.photo.url }}" alt="Profile Photo" class="profile-img">
        {% else %}
            <div class="no-photo">
                <i class="fas fa-user fa-3x"></i>
            </div>
        {% endif %}
        <span class="status-tag">Resident</span>
    </div>

    <h2>{{ profile.name }}</h2>
    <p class="sub-text">Managing your premium residency details</p>

    <div class="info-card">
        <div class="info-row">
            <i class="fas fa-envelope"></i>
            <div class="info-content">
                <label>Email Address</label>
                <span>{{ profile.email }}</span>
            </div>
        </div>

        <div class="info-row">
            <i class="fas fa-phone"></i>
            <div class="info-content">
                <label>Phone Number</label>
                <span>{{ profile.phone }}</span>
            </div>
        </div>

        <div class="info-row">
            <i class="fas fa-door-open"></i>
            <div class="info-content">
                <label>Assigned Unit</label>
                <span>Room {{ profile.ROOM.roomnumber }}</span>
            </div>
        </div>
    </div>

    <div class="button-group">
        <a href="/myapp/user_home/" class="btn btn-back">
            <i class="fas fa-arrow-left"></i> Home
        </a>
        <a href="{% url 'user_edit_profile' %}" class="btn btn-edit">
            <i class="fas fa-user-edit"></i> Edit Profile
        </a>
    </div>
</div>

</body>
</html>
