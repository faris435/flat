<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Vista | Add Facility</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-rose: #f43f5e;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(244, 63, 94, 0.08) 0%, transparent 40%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--text-main);
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .icon-circle {
            background: rgba(59, 130, 246, 0.1);
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 22px;
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-blue);
            font-size: 30px;
        }

        h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        .form-group { margin-bottom: 22px; }

        label { 
            display: block; 
            margin: 0 0 10px 5px; 
            font-weight: 700; 
            color: var(--text-dim); 
            font-size: 11px; 
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        
        input[type="text"], 
        input[type="file"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="file"] {
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            margin-right: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .btn-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
            filter: brightness(1.1);
        }
        
        .nav-footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .footer-link:hover { color: white; }
        .dash-link:hover { color: var(--accent-rose); }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <div class="icon-circle">
            <i class="fas fa-swimmer"></i>
        </div>
        <h2>New Facility</h2>
        <p>Register a new amenity for the property</p>
    </div>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Facility Name</label>
            <input type="text" name="name" placeholder="e.g. Infinity Pool, Gym" required>
        </div>

        <div class="form-group">
            <label>Details / Description</label>
            <input type="text" name="description" placeholder="Briefly describe the facility" required>
        </div>

        <div class="form-group">
            <label>Feature Photo</label>
            <input type="file" name="photo" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-plus-circle" style="margin-right: 8px;"></i> Create Facility
        </button>
    </form>
    
    <div class="nav-footer">
        <a href="/myapp/admin_view_facility/" class="footer-link">
            <i class="fas fa-arrow-left"></i> Back to Facilities List
        </a>
        <a href="/myapp/admin_home/" class="footer-link dash-link">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
    </div>
</div>

</body>
</html>
