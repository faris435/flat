<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Vista | Edit Facility</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-rose: #f43f5e;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(244, 63, 94, 0.08) 0%, transparent 40%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: var(--text-main);
            padding: 40px 20px;
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-header { text-align: center; margin-bottom: 30px; }
        .icon-circle {
            background: rgba(59, 130, 246, 0.1);
            width: 60px; height: 60px; line-height: 60px;
            border-radius: 18px; display: inline-block;
            margin-bottom: 15px; color: var(--accent-blue); font-size: 24px;
        }

        h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; margin: 0 0 8px 5px; 
            font-weight: 700; color: var(--text-dim); 
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        input[type="text"], select, input[type="file"] {
            width: 100%; padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px; color: white;
            font-family: inherit; font-size: 14px;
            transition: 0.3s; box-sizing: border-box;
        }

        select option { background: #1e293b; color: white; }

        input:focus, select:focus {
            outline: none; border-color: var(--accent-blue);
            background: rgba(15, 23, 42, 0.9);
        }

        /* Image Preview Box */
        .current-photo-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px; border-radius: 15px;
            margin-bottom: 20px; border: 1px dashed var(--glass-border);
            display: flex; align-items: center; gap: 20px;
        }

        .preview-img {
            width: 80px; height: 80px;
            object-fit: cover; border-radius: 10px;
            border: 2px solid var(--glass-border);
        }

        .btn-update {
            width: 100%; background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
            color: white; border: none; padding: 16px;
            border-radius: 14px; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-update:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .nav-footer {
            margin-top: 25px; padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-between;
        }

        .footer-link {
            text-decoration: none; color: var(--text-dim);
            font-size: 12px; font-weight: 600; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }

        .footer-link:hover { color: white; }
        .dash-link:hover { color: var(--accent-rose); }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <div class="icon-circle"><i class="fas fa-edit"></i></div>
        <h2>Edit Facility</h2>
        <p>Modify details for <strong>{{ data.name }}</strong></p>
    </div>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Facility Name</label>
            <input type="text" name="name" value="{{ data.name }}" required>
        </div>

        <div class="form-group">
            <label>Details</label>
            <input type="text" name="description" value="{{ data.description }}" required>
        </div>

        <div class="form-group">
            <label>Operation Status</label>
            <select name="status">
                <option value="Active" {% if data.Status == "Active" %}selected{% endif %}>Active</option>
                <option value="Inactive" {% if data.Status == "Inactive" %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <label>Current Photo</label>
        <div class="current-photo-box">
            {% if data.photo %}
                <img src="{{ data.photo.url }}" class="preview-img" alt="Current">
                <div style="font-size: 12px; color: var(--text-dim);">Existing image will be kept unless you upload a new one.</div>
            {% else %}
                <div class="preview-img" style="display:flex; align-items:center; justify-content:center; background:#0f172a;">
                    <i class="fas fa-image"></i>
                </div>
                <div style="font-size: 12px; color: var(--text-dim);">No image currently assigned.</div>
            {% endif %}
        </div>

        <div class="form-group">
            <label>Upload New Photo (Optional)</label>
            <input type="file" name="photo" accept="image/*">
        </div>

        <button type="submit" class="btn-update">
            <i class="fas fa-save" style="margin-right: 8px;"></i> Save Changes
        </button>
    </form>
    
    <div class="nav-footer">
        <a href="/myapp/admin_view_facility/" class="footer-link">
            <i class="fas fa-chevron-left"></i> Cancel
        </a>
        <a href="/myapp/admin_home/" class="footer-link dash-link">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
    </div>
</div>

</body>
</html>
