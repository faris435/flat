<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Vista | Update Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-rose: #fb7185; 
            --accent-blue: #3b82f6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(251, 113, 133, 0.05) 0%, transparent 40%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            color: var(--text-main);
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header i {
            font-size: 32px; color: var(--accent-rose);
            background: rgba(251, 113, 133, 0.1);
            width: 60px; height: 60px; line-height: 60px;
            border-radius: 18px; display: inline-block; margin-bottom: 15px;
        }

        h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        label { 
            display: block; margin: 0 0 8px 4px; 
            font-weight: 700; color: var(--text-dim); 
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%; padding: 14px 18px; margin-bottom: 20px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            border-radius: 14px; color: white; font-family: inherit; font-size: 15px;
            box-sizing: border-box; transition: all 0.3s;
        }

        input:focus {
            outline: none; border-color: var(--accent-rose);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.1);
        }

        /* --- Image Preview Section --- */
        .current-image-container {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .current-image-container img {
            max-width: 100%; height: 140px;
            object-fit: cover; border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .no-img-text { font-size: 13px; color: var(--text-dim); margin: 10px 0; }

        /* --- Action Buttons --- */
        .btn-update {
            width: 100%; background: linear-gradient(135deg, var(--accent-rose), #e11d48);
            color: white; border: none; padding: 16px;
            border-radius: 14px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(251, 113, 133, 0.2);
        }

        .btn-update:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(251, 113, 133, 0.3);
            filter: brightness(1.1);
        }
        
        .cancel-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 25px; text-decoration: none;
            color: var(--text-dim); font-size: 14px; font-weight: 600; transition: 0.2s;
        }
        .cancel-link:hover { color: white; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <i class="fas fa-edit"></i>
        <h2>Edit Unit Details</h2>
        <p>Updating Room: <strong>{{data.roomnumber}}</strong></p>
    </div>
    
    <form method="post" action="/myapp/edit_room/{{data.id}}/" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Floor Level</label>
        <input type="number" name="floor" value="{{data.floor}}" required>

        <label>Unit Number</label>
        <input type="text" name="room_no" value="{{data.roomnumber}}" required>

        <label>Unit Specifications</label>
        <input type="text" name="details" value="{{data.details}}" required>

        <label>Active Room Preview</label>
        <div class="current-image-container">
            {% if data.image %}
                <img src="{{ data.image.url }}" alt="Current Room Image">
            {% else %}
                <div class="no-img-text">
                    <i class="fas fa-image" style="display:block; font-size: 24px; margin-bottom: 5px; opacity: 0.5;"></i>
                    No preview currently available
                </div>
            {% endif %}
        </div>

        <label>Replace Photo (Optional)</label>
        <input type="file" name="image" accept="image/*">

        <button type="submit" class="btn-update">Save Changes</button>
    </form>
    
    <a href="/myapp/view_room/" class="cancel-link">
        <i class="fas fa-times"></i> Discard Changes
    </a>
</div>

</body>
</html>
