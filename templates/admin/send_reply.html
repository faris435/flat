<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anna Vista | Compose Reply</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <style>
        body {
            background: #05070a; font-family: 'Plus Jakarta Sans', sans-serif;
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .reply-box {
            background: rgba(15, 20, 34, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 40px; border-radius: 32px;
            width: 500px; backdrop-filter: blur(20px);
        }
        .original-complaint {
            background: rgba(255, 62, 141, 0.05);
            border-left: 3px solid #ff3e8d;
            padding: 15px; margin-bottom: 30px;
            border-radius: 0 12px 12px 0;
        }
        textarea {
            width: 100%; height: 150px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: white;
            padding: 15px; font-family: inherit; resize: none; margin-top: 10px;
        }
        textarea:focus { outline: none; border-color: #4f8ef7; }
        .btn-send {
            width: 100%; padding: 15px; margin-top: 20px;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, #ff3e8d 0%, #4f8ef7 100%);
            color: white; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reply-box">
        <h2 style="margin-bottom: 10px;">Send Official Reply</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Replying to <strong>{{ data.USER.name }}</strong></p>

        <div class="original-complaint">
            <small style="color: #ff3e8d; font-weight: 800;">RESIDENT COMPLAINT:</small>
            <p style="margin-top: 5px; font-size: 14px; opacity: 0.9;">{{ data.Complain }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <label style="font-size: 12px; color: #4f8ef7; font-weight: 800; text-transform: uppercase;">Your Response</label>
            <textarea name="reply" placeholder="Type your resolution here..." required></textarea>
            <button type="submit" class="btn-send">Update Complaint Status</button>
        </form>
    </div>

</body>
</html>
