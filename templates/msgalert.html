<style>
    :root {
        --toast-bg: rgba(15, 20, 34, 0.85);
        --toast-border: rgba(255, 255, 255, 0.1);
        --success: #2dd4bf; /* Teal */
        --error: #ff3e8d;   /* Pink */
        --info: #4f8ef7;    /* Blue */
        --warning: #fbbf24; /* Amber */
    }

    .toast-container {
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 15px;
        pointer-events: none;
    }

    .premium-toast {
        pointer-events: auto;
        min-width: 320px;
        max-width: 400px;
        background: var(--toast-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--toast-border);
        border-radius: 16px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        animation: toastIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        transition: all 0.4s ease;
    }

    /* Message Icons Styling */
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .premium-toast.success .toast-icon { background: rgba(45, 212, 191, 0.15); color: var(--success); }
    .premium-toast.error .toast-icon { background: rgba(255, 62, 141, 0.15); color: var(--error); }
    .premium-toast.info .toast-icon { background: rgba(79, 142, 247, 0.15); color: var(--info); }
    .premium-toast.warning .toast-icon { background: rgba(251, 191, 36, 0.15); color: var(--warning); }

    /* Content */
    .toast-content {
        flex-grow: 1;
    }

    .toast-title {
        font-weight: 800;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
        color: white;
    }

    .toast-message {
        font-size: 14px;
        color: #94a3b8;
        line-height: 1.4;
    }

    /* Closing Action */
    .toast-close {
        color: #64748b;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }
    .toast-close:hover { color: white; }

    /* Progress Bar Animation */
    .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        width: 100%;
        background: rgba(255,255,255,0.1);
    }

    .toast-progress-bar {
        height: 100%;
        width: 100%;
        animation: progress 5s linear forwards;
    }

    .success .toast-progress-bar { background: var(--success); }
    .error .toast-progress-bar { background: var(--error); }
    .info .toast-progress-bar { background: var(--info); }
    .warning .toast-progress-bar { background: var(--warning); }

    /* Animations */
    @keyframes toastIn {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes toastOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100px); opacity: 0; }
    }

    @keyframes progress {
        from { width: 100%; }
        to { width: 0%; }
    }

    .toast-exit {
        animation: toastOut 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards !important;
    }
</style>

<div class="toast-container" id="toastContainer">
    {% if messages %}
        {% for message in messages %}
            <div class="premium-toast {{ message.tags }}" id="toast-{{ forloop.index }}">
                <div class="toast-icon">
                    {% if message.tags == 'success' %}
                        <i class="fas fa-check-double"></i>
                    {% elif message.tags == 'error' %}
                        <i class="fas fa-exclamation-triangle"></i>
                    {% elif message.tags == 'warning' %}
                        <i class="fas fa-bell"></i>
                    {% else %}
                        <i class="fas fa-info-circle"></i>
                    {% endif %}
                </div>

                <div class="toast-content">
                    <div class="toast-title">{{ message.tags|capfirst }}</div>
                    <div class="toast-message">{{ message }}</div>
                </div>

                <div class="toast-close" onclick="closeToast('toast-{{ forloop.index }}')">
                    <i class="fas fa-times"></i>
                </div>

                <div class="toast-progress">
                    <div class="toast-progress-bar"></div>
                </div>
            </div>
        {% endfor %}
    {% endif %}
</div>

<script>
    function closeToast(id) {
        const toast = document.getElementById(id);
        if (toast) {
            toast.classList.add('toast-exit');
            setTimeout(() => {
                toast.remove();
            }, 500);
        }
    }

    // Auto-dismiss logic
    document.addEventListener('DOMContentLoaded', () => {
        const toasts = document.querySelectorAll('.premium-toast');
        toasts.forEach(toast => {
            setTimeout(() => {
                closeToast(toast.id);
            }, 5000); // 5 Seconds
        });
    });
</script>
