<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service | Executive Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --accent-gold: #d4af37;
            --accent-gold-soft: rgba(212, 175, 55, 0.1);
            --border-glass: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.02);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at top left, rgba(212, 175, 55, 0.05), transparent 40%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.03), transparent 40%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 45px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .header-box {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-box span {
            color: var(--accent-gold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-glass) !important;
            border-radius: 14px !important;
            color: white !important;
            padding: 12px 18px !important;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.04) !important;
            border-color: var(--accent-gold) !important;
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Image Preview Section */
        .preview-wrapper {
            margin-bottom: 20px;
            text-align: center;
        }

        .preview-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            filter: brightness(0.8);
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-action {
            padding: 14px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
        }

        .btn-update {
            background: var(--accent-gold);
            color: #000;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .btn-update:hover {
            background: #fff;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--accent-gold);
            color: #000;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header-box">
        <span>Strategic Asset Update</span>
        <h3>Refine Service</h3>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Service Nomenclature</label>
        <input type="text" name="name" class="form-control" value="{{ ob.name }}" required>

        <label>Value Proposition / Description</label>
        <textarea name="description" class="form-control" rows="3" required>{{ ob.description }}</textarea>

        <label>Current Valuation (INR)</label>
        <input type="number" name="price" class="form-control" value="{{ ob.price }}" required>

        <div class="preview-wrapper">
            <label>Current Visual Asset</label>
            <img src="{{ ob.photo.url }}" class="preview-img" alt="Service Preview">
        </div>

        <label>Reassign Visual Asset</label>
        <input type="file" name="photo" class="form-control">

        <label>Availability Status</label>
        <select name="status" class="form-control">
            <option value="Active" {% if ob.status == 'Active' %}selected{% endif %}>Operational (Active)</option>
            <option value="Inactive" {% if ob.status == 'Inactive' %}selected{% endif %}>Offline (Inactive)</option>
        </select>

        <div class="btn-group">
            <a href="/myapp/view_services/" class="btn-action btn-back">Return</a>
            <button type="submit" class="btn-action btn-update">Save Changes</button>
        </div>
    </form>
</div>

</body>
</html>
