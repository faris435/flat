<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0c;
            --surface-color: #121214;
            --surface-elevated: #1a1a1d;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1c94f;
            --text-primary: #ffffff;
            --text-secondary: #8a8a93;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            margin: 0;
        }

        .edit-container {
            display: grid;
            grid-template-columns: 0.7fr 1.3fr;
            max-width: 1100px;
            width: 100%;
            background: var(--surface-color);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Side Header Panel */
        .header-pane {
            background: var(--surface-elevated);
            padding: 4rem 3rem;
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header-pane h2 {
            font-weight: 300;
            font-size: 2.2rem;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .header-pane h2 span {
            color: var(--accent-gold);
            display: block;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .helper-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-top: 2rem;
        }

        /* Form Panel */
        .form-pane {
            padding: 4rem 5rem;
        }

        label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            display: block;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: none !important;
            border-bottom: 1px solid var(--border-subtle) !important;
            border-radius: 0 !important;
            color: var(--text-primary) !important;
            padding: 0.8rem 0 !important;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            transition: all 0.4s ease;
        }

        .form-control:focus {
            box-shadow: none !important;
            border-bottom-color: var(--accent-gold) !important;
            background: transparent !important;
        }

        /* Custom File Input Styling */
        .file-stack {
            margin-bottom: 2.5rem;
        }

        .current-tag {
            font-size: 0.7rem;
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 10px;
            text-transform: none;
            letter-spacing: 0;
        }

        input[type="file"]::file-selector-button {
            background: var(--surface-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--accent-gold);
            color: var(--bg-base);
        }

        .btn-save {
            background: var(--accent-gold);
            color: var(--bg-base);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.4s ease;
        }

        .btn-save:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 992px) {
            .edit-container { grid-template-columns: 1fr; }
            .header-pane { border-right: none; border-bottom: 1px solid var(--border-subtle); padding: 3rem 2rem; }
            .form-pane { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

<div class="edit-container">
    <div class="header-pane">
        <div>
            <h2><span>Account</span> Settings</h2>
            <p class="helper-text">
                Ensure your information is accurate. These details are used for identity verification and luxury residency eligibility.
            </p>
        </div>
        <div class="d-none d-lg-block">
            <small style="color: var(--border-subtle); letter-spacing: 5px;">EST. 2026</small>
        </div>
    </div>

    <div class="form-pane">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ data.name }}" required placeholder="e.g. Julian Vane">
                </div>
                <div class="col-md-6">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ data.email }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label for="phone">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" value="{{ data.phone }}" required>
                </div>
                <div class="col-md-6">
                    <label for="place">City / Place</label>
                    <input type="text" class="form-control" id="place" name="place" value="{{ data.place }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-7">
                    <label for="post">Post Office</label>
                    <input type="text" class="form-control" id="post" name="post" value="{{ data.post }}" required>
                </div>
                <div class="col-md-5">
                    <label for="pincode">Zip Code</label>
                    <input type="number" class="form-control" id="pincode" name="pin" value="{{ data.pin }}" required>
                </div>
            </div>

            <div class="file-stack">
                <label for="photo">
                    Profile Portrait
                    {% if data.photo %}<span class="current-tag">Existing: {{ data.photo.name|truncatechars:15 }}</span>{% endif %}
                </label>
                <input type="file" class="form-control" id="photo" name="photo" accept="image/*">   
            </div>

            <div class="file-stack">
                <label for="proof">
                    Legal Documentation (ID)
                    {% if data.proof %}<span class="current-tag">Existing: {{ data.proof.name|truncatechars:15 }}</span>{% endif %}
                </label>
                <input type="file" class="form-control" id="proof" name="proof">
            </div>

            <button type="submit" class="btn-save">Update Profile</button>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            
                <a href="/myapp/view_profile/" class="btn btn-outline-secondary" style="flex: 1; padding: 0.8rem 2rem; border-color: var(--border-subtle); color: var(--text-secondary); text-decoration: none; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease;">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>Back
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
