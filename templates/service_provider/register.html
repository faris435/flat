<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Vista | Partner Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* Restored the matching Pink/Blue Theme */
            --bg-deep: #0f172a;      
            --bg-card: rgba(30, 41, 59, 0.75); 
            --bg-input: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-muted: #64748b;
            --text-sub: #94a3b8;
            
            /* Back to Pink & Blue */
            --accent-1: #ff3e8d; 
            --accent-2: #4f8ef7; 
            --gradient-primary: linear-gradient(135deg, #ff3e8d 0%, #4f8ef7 100%);
            --glow: rgba(255, 62, 141, 0.3);
            --error: #fb7185; /* Soft pink-red for errors */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 25%, rgba(79, 142, 247, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(255, 62, 141, 0.12) 0%, transparent 45%);
        }

        .main-wrapper {
            display: flex;
            width: 1150px;
            max-width: 100%;
            height: 85vh;
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .visual-panel {
            flex: 0.8;
            background: var(--gradient-primary); /* Back to pink/blue */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
            color: white;
        }

        .visual-panel::before {
            content: "";
            position: absolute; inset: 0;
            background: url('/static/service.jpg') center/cover no-repeat;
            opacity: 0.1;
        }

        .visual-content { position: relative; z-index: 2; margin-top: auto; margin-bottom: auto; }
        .brand-pill {
            display: inline-flex; align-items: center;
            padding: 8px 16px; background: rgba(255,255,255,0.15);
            border-radius: 100px; font-size: 14px; font-weight: 600;
            margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.2);
        }

        .headline { font-size: 40px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; }
        .subline { font-size: 16px; opacity: 0.9; line-height: 1.6; }

        .form-panel {
            flex: 1.4; padding: 40px 60px;
            display: flex; flex-direction: column;
            background: rgba(15, 23, 42, 0.3); overflow-y: auto;
        }

        .form-panel::-webkit-scrollbar { width: 6px; }
        .form-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .section-title {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; font-weight: 700;
            color: var(--accent-2); margin: 30px 0 15px 0;
            display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-sub); }

        input, select {
            width: 100%; padding: 12px 16px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; color: white; font-family: inherit;
            font-size: 14px; transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--accent-1);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 62, 141, 0.15);
        }

        .err-msg { color: var(--error); font-size: 11px; font-weight: 500; min-height: 15px; }

        .btn-submit {
            width: 100%; padding: 16px; margin-top: 40px;
            border: none; border-radius: 14px;
            background: var(--gradient-primary); color: white;
            font-weight: 800; font-size: 16px; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; transition: all 0.4s;
            box-shadow: 0 10px 20px -5px var(--glow);
        }

        .btn-submit:hover { transform: translateY(-3px); filter: brightness(1.1); }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <main class="main-wrapper">
        <div class="visual-panel">
            <div class="visual-content">
                <div class="brand-pill">🤝 Partner Portal</div>
                <h1 class="headline">Join the Elite <br>Service Network.</h1>
                <p class="subline">Partner with Anna Vista to provide premium services to our residents. Verified professionals only.</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2 style="font-size: 28px; font-weight: 800;">Provider Onboarding</h2>
                <p style="color: var(--text-sub); margin-bottom: 30px;">Set up your professional account</p>
            </div>

            <form action="/myapp/register_post/" method="post" enctype="multipart/form-data" id="pForm">
                {% csrf_token %}

                <div class="section-title">Identity</div>
                <div class="grid-container">
                    <div class="form-group full-width">
                        <label>Business / Provider Name</label>
                        <input type="text" name="name" id="name">
                        <span class="err-msg" id="nameErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" id="email">
                        <span class="err-msg" id="emailErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" name="phone" id="phone" maxlength="10">
                        <span class="err-msg" id="phoneErr"></span>
                    </div>
                </div>

                <div class="section-title">Specialization</div>
                <div class="grid-container">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" id="cat">
                            <option value="">-- Select --</option>
                            {% for i in category %}
                                <option value="{{ i.id }}">{{ i.category }}</option>
                            {% endfor %}
                        </select>
                        <span class="err-msg" id="catErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Post </label>
                        <input type="text" name="post" id="post">
                        <span class="err-msg" id="postErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Profile Photo</label>
                        <input type="file" name="photo" id="photo" accept="image/*">
                        <span class="err-msg" id="photoErr"></span>
                    </div>
                </div>

                <div class="section-title">Verification</div>
                <div class="grid-container">
                    <div class="form-group">
                        <label>Place</label>
                        <input type="text" name="place" id="place">
                        <span class="err-msg" id="placeErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" name="pin" id="pin" maxlength="6">
                        <span class="err-msg" id="pinErr"></span>
                    </div>
                    <div class="form-group full-width">
                        <label>ID Proof (GST / Aadhar / License)</label>
                        <input type="file" name="proof" id="proof">
                        <span class="err-msg" id="proofErr"></span>
                    </div>
                </div>

                <div class="section-title">Access</div>
                <div class="grid-container">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" id="user">
                        <span class="err-msg" id="userErr"></span>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" id="pass">
                        <span class="err-msg" id="passErr"></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Submit Application</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('pForm').onsubmit = function(e) {
            let valid = true;
            const clear = () => document.querySelectorAll('.err-msg').forEach(el => el.innerText = "");
            const set = (id, msg) => { document.getElementById(id).innerText = msg; valid = false; };
            
            clear();

            if(document.getElementById('name').value.length < 3) set('nameErr', "Name too short");
            if(!/^\S+@\S+\.\S+$/.test(document.getElementById('email').value)) set('emailErr', "Invalid email");
            if(!/^\d{10}$/.test(document.getElementById('phone').value)) set('phoneErr', "Enter 10 digits");
            if(!document.getElementById('cat').value) set('catErr', "Select a category");
            if(document.getElementById('post').value.length < 2) set('postErr', "Enter a valid post");
            if(!document.getElementById('photo').files.length) set('photoErr', "Upload a photo");
            if(!/^\d{6}$/.test(document.getElementById('pin').value)) set('pinErr', "Invalid pincode");
            if(!document.getElementById('proof').files.length) set('proofErr', "ID Proof required");
            if(document.getElementById('user').value.length < 4) set('userErr', "Username too short");
            if(document.getElementById('pass').value.length < 6) set('passErr', "Min 6 characters");

            if(!valid) e.preventDefault();
        };
    </script>
</body>
</html>
