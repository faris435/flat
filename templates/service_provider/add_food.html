<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food Item | Luxury Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0c;
            --surface-color: #121214;
            --surface-elevated: #1a1a1d;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f1c94f;
            --text-primary: #ffffff;
            --text-secondary: #8a8a93;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            margin: 0;
        }

        .add-container {
            display: grid;
            grid-template-columns: 0.7fr 1.3fr;
            max-width: 1100px;
            width: 100%;
            background: var(--surface-color);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Left Side Editorial Pane */
        .editorial-pane {
            background: var(--surface-elevated);
            padding: 4rem 3rem;
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .editorial-pane h2 {
            font-weight: 300;
            font-size: 2.2rem;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .editorial-pane h2 span {
            color: var(--accent-gold);
            display: block;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .instruction-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-top: 2rem;
        }

        /* Form Pane */
        .form-pane {
            padding: 4rem 5rem;
        }

        label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            display: block;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: none !important;
            border-bottom: 1px solid var(--border-subtle) !important;
            border-radius: 0 !important;
            color: var(--text-primary) !important;
            padding: 0.8rem 0 !important;
            font-size: 1rem;
            margin-bottom: 2rem;
            transition: all 0.4s ease;
        }

        .form-control:focus {
            box-shadow: none !important;
            border-bottom-color: var(--accent-gold) !important;
            background: transparent !important;
        }

        textarea.form-control {
            border: 1px solid var(--border-subtle) !important;
            padding: 1rem !important;
            margin-top: 0.5rem;
        }

        /* File Upload */
        input[type="file"]::file-selector-button {
            background: var(--surface-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--accent-gold);
            color: var(--bg-base);
        }

        .btn-luxury-submit {
            background: var(--accent-gold);
            color: var(--bg-base);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.4s ease;
        }

        .btn-luxury-submit:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 992px) {
            .add-container { grid-template-columns: 1fr; }
            .editorial-pane { border-right: none; border-bottom: 1px solid var(--border-subtle); padding: 3rem 2rem; }
            .form-pane { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

<div class="add-container">
    <div class="editorial-pane">
        <div>
            <h2><span>Menu</span> Cataloging</h2>
            <p class="instruction-text">
                Add a new culinary creation to your portfolio. High-quality imagery and detailed descriptions help elevate the presentation.
            </p>
        </div>
        <div class="d-none d-lg-block">
            <a href="{% url 'service_home' %}" style="color: var(--accent-gold); text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">&larr; Exit to Home</a>
        </div>
    </div>

    <div class="form-pane">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Item Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Saffron Infused Risotto" required>
            </div>

            <div class="form-group">
                <label for="description">Detailed Description</label>
                <textarea class="form-control" id="description" name="details" rows="2" placeholder="Briefly describe the ingredients and inspiration..."></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label for="price">Valuation (₹)</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                </div>
                <div class="col-md-6">
                    <label for="quantity">Initial Stock</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label for="mfg_date">Release Date</label>
                    <input type="date" class="form-control" id="mfg_date" name="mfg_date" required>
                </div>
                <div class="col-md-6">
                    <label for="photo">Item Visual</label>
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*" style="padding-top: 1.2rem !important;">
                </div>
            </div>

            <button type="submit" class="btn-luxury-submit">Register Item</button>
        </form>
    </div>
</div>

</body>
</html>
