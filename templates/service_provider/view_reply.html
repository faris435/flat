<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reply</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center:""">
            <div class="col-md-6">
                <h2>View Reply</h2>
                <table class="table table-bordered">
                <tr>
                    <th>Sl.No</th>
                    <th>Complaint</th>
                    <th>Reply</th>
                    <th>date</th>
                </tr>
                {% for reply in replies %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ reply.complaint }}</td>
                    <td>{{ reply.reply }}</td>
                    <td>{{ reply.date }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No replies found.</td>
                </tr>
                {% endfor %}    
                </table>
            </div>
        </div>  
    </div>
    <button id="send_complaint" class="btn btn-primary mt-3"><a href="{% url 'send_complaint' %}" class="text-white text-decoration-none">Send Complaint</a></button>
</body>
</html>
