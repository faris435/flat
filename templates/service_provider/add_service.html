<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Service | Executive Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #0f0f12;
            --accent-gold: #d4af37;
            --accent-gold-soft: rgba(212, 175, 55, 0.1);
            --border-glass: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.02);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.05), transparent 40%),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.03), transparent 40%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* Subtle gold accent at top */
        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        .header-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-box span {
            color: var(--accent-gold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-glass) !important;
            border-radius: 14px !important;
            color: white !important;
            padding: 14px 18px !important;
            font-size: 0.9rem;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.04) !important;
            border-color: var(--accent-gold) !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
            outline: none;
        }

        textarea.form-control {
            min-height: 120px;
            resize: none;
        }

        .btn-submit {
            background: var(--accent-gold);
            color: #000;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.25);
        }

        /* File input specific styling */
        .file-input-wrapper {
            position: relative;
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--accent-gold);
            color: #000;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header-box">
        <span>Strategic Asset</span>
        <h3>Initialize Service</h3>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="field-group">
            <label for="name">Nomenclature / Name</label>
            <input type="text" name="name" id="name" class="form-control" placeholder="Identify your service" required>
        </div>

        <div class="field-group">
            <label for="description">Value Proposition / Description</label>
            <textarea name="description" id="description" class="form-control" placeholder="Outline the benefits and scope..." required></textarea>
        </div>

        <div class="field-group">
            <label for="price">Valuation (INR)</label>
            <input type="number" name="price" id="price" class="form-control" placeholder="0.00" required>
        </div>

        <div class="field-group">
            <label for="photo">Visual Asset / Photo</label>
            <input type="file" name="photo" id="photo" class="form-control" required>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-check-circle me-2"></i> Deploy to Portfolio
        </button>
    </form>

    <a href="/myapp/view_services/" class="back-link">
        <i class="fas fa-chevron-left me-1"></i> Return to Registry
    </a>
</div>

</body>
</html>
